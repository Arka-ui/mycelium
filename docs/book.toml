[book]
authors = ["The Mycelium Authors"]
language = "en"
multilingual = false
src = "."
title = "Mycelium Documentation"
description = "Local-first, end-to-end encrypted, peer-to-peer collaborative knowledge workspace"

[build]
build-dir = "../book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/mycelium-app/mycelium"
edit-url-template = "https://github.com/mycelium-app/mycelium/edit/main/docs/{path}"
no-section-label = false
copy-fonts = true
mathjax-support = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.linkcheck]
follow-web-links = false
warning-policy = "warn"
exclude = [ "github\\.com", "mycelium\\.invalid" ]
