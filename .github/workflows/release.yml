name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-beta.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/nsis/*.exe.sig
              target/release/bundle/msi/*.msi
              target/release/bundle/msi/*.msi.sig
          - os: macos-latest
            artifact-glob: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app.tar.gz
              target/release/bundle/macos/*.app.tar.gz.sig
          - os: ubuntu-latest
            artifact-glob: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/appimage/*.AppImage.sig
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsoup-3.0-dev clang

      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm --no-progress

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Detect signing secrets
        id: signing
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "Signing secrets present; will build signed updater bundle."
            echo "have_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY secret is not set. Building UNSIGNED bundle (no .sig produced; auto-update from this build will not verify)."
            echo "have_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed bundle (with updater artefacts)
        if: steps.signing.outputs.have_signing == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: cargo tauri build

      - name: Build unsigned bundle (no signing key configured)
        if: steps.signing.outputs.have_signing != 'true'
        working-directory: apps/desktop
        run: cargo tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-bundle
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute SHA-256 sums
        run: |
          mkdir -p artifacts
          cd artifacts
          find . -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) -print0 \
            | xargs -0 -r sha256sum > sha256sums.txt || true
          ls -la
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ contains(github.event.inputs.tag, 'beta') || contains(github.ref_name, 'beta') }}
          files: |
            artifacts/**/*
          generate_release_notes: true
