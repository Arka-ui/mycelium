<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0f12"/>
      <stop offset="1" stop-color="#16181d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7aa6ff"/>
      <stop offset="1" stop-color="#5a86df"/>
    </linearGradient>
    <linearGradient id="sidecar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2026"/>
      <stop offset="1" stop-color="#16181d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="580" fill="url(#bg)"/>

  <text x="480" y="38" text-anchor="middle" fill="#e6e6e6" font-size="20" font-weight="600">Mycelium architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#6f7177" font-size="11">One process per concern. The BEAM supervises everything; sidecars own the unsafe libraries.</text>

  <!-- User layer -->
  <g>
    <rect x="40" y="90" width="880" height="60" rx="10" fill="#16181d" stroke="#23262d"/>
    <text x="60" y="115" fill="#a8aab0" font-size="11" font-weight="600" letter-spacing="0.7">USER INTERFACE</text>
    <rect x="60" y="123" width="240" height="22" rx="6" fill="#1d2026" stroke="#23262d"/>
    <text x="180" y="138" text-anchor="middle" fill="#e6e6e6" font-size="11">Tauri webview (Edge / WebKit)</text>
    <rect x="320" y="123" width="240" height="22" rx="6" fill="#1d2026" stroke="#23262d"/>
    <text x="440" y="138" text-anchor="middle" fill="#e6e6e6" font-size="11">Lustre server-component (M2+)</text>
    <rect x="580" y="123" width="160" height="22" rx="6" fill="#1d2026" stroke="#23262d"/>
    <text x="660" y="138" text-anchor="middle" fill="#e6e6e6" font-size="11">CLI (mycelium-cli)</text>
    <rect x="760" y="123" width="160" height="22" rx="6" fill="#1d2026" stroke="#23262d"/>
    <text x="840" y="138" text-anchor="middle" fill="#e6e6e6" font-size="11">Plugin sandbox</text>
  </g>

  <!-- BEAM core -->
  <g>
    <rect x="40" y="180" width="880" height="120" rx="10" fill="url(#accent)" opacity="0.12" stroke="#7aa6ff" stroke-opacity="0.6"/>
    <text x="60" y="205" fill="#7aa6ff" font-size="11" font-weight="600" letter-spacing="0.7">BEAM CORE   ·   Gleam on Erlang/OTP 27</text>
    <text x="60" y="222" fill="#a8aab0" font-size="11">Supervision tree, request routing, per-document actors, port codec, registry, identity</text>

    <g font-size="10.5" fill="#e6e6e6">
      <rect x="60"  y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="127" y="257" text-anchor="middle">core_supervisor</text>
      <text x="127" y="272" text-anchor="middle" fill="#6f7177" font-size="10">rest_for_one root</text>

      <rect x="205" y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="272" y="257" text-anchor="middle">storage_supervisor</text>
      <text x="272" y="272" text-anchor="middle" fill="#6f7177" font-size="10">surreal_port owner</text>

      <rect x="350" y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="417" y="257" text-anchor="middle">crdt_supervisor</text>
      <text x="417" y="272" text-anchor="middle" fill="#6f7177" font-size="10">loro_port owner</text>

      <rect x="495" y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="562" y="257" text-anchor="middle">network_supervisor</text>
      <text x="562" y="272" text-anchor="middle" fill="#6f7177" font-size="10">iroh_port owner</text>

      <rect x="640" y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="707" y="257" text-anchor="middle">search_supervisor</text>
      <text x="707" y="272" text-anchor="middle" fill="#6f7177" font-size="10">fastembed_port</text>

      <rect x="785" y="240" width="135" height="44" rx="6" fill="#16181d" stroke="#23262d"/>
      <text x="852" y="257" text-anchor="middle">plugin_supervisor</text>
      <text x="852" y="272" text-anchor="middle" fill="#6f7177" font-size="10">wasmedge_port</text>
    </g>
  </g>

  <!-- Sidecars -->
  <g>
    <rect x="40" y="330" width="880" height="120" rx="10" fill="#16181d" stroke="#23262d"/>
    <text x="60" y="355" fill="#a8aab0" font-size="11" font-weight="600" letter-spacing="0.7">RUST SIDECARS   ·   one OS process each, port-protocol over stdio (CBOR)</text>
    <text x="60" y="372" fill="#6f7177" font-size="11">No NIFs. A crashing sidecar cannot bring down the BEAM. Each binary is signed and audited independently.</text>

    <g font-size="10.5">
      <rect x="60"  y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="127" y="407" text-anchor="middle" fill="#88c0d0">surreal_port</text>
      <text x="127" y="422" text-anchor="middle" fill="#6f7177" font-size="10">SurrealDB + RocksDB</text>

      <rect x="205" y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="272" y="407" text-anchor="middle" fill="#88c0d0">loro_port</text>
      <text x="272" y="422" text-anchor="middle" fill="#6f7177" font-size="10">CRDT engine</text>

      <rect x="350" y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="417" y="407" text-anchor="middle" fill="#88c0d0">iroh_port</text>
      <text x="417" y="422" text-anchor="middle" fill="#6f7177" font-size="10">QUIC + mDNS + DNS</text>

      <rect x="495" y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="562" y="407" text-anchor="middle" fill="#88c0d0">crypto_port</text>
      <text x="562" y="422" text-anchor="middle" fill="#6f7177" font-size="10">Ed25519 / X25519 / age</text>

      <rect x="640" y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="707" y="407" text-anchor="middle" fill="#88c0d0">fastembed_port</text>
      <text x="707" y="422" text-anchor="middle" fill="#6f7177" font-size="10">MiniLM-L6-v2 INT8</text>

      <rect x="785" y="390" width="135" height="44" rx="6" fill="url(#sidecar)" stroke="#2a5a64"/>
      <text x="852" y="407" text-anchor="middle" fill="#88c0d0">wasmedge_port</text>
      <text x="852" y="422" text-anchor="middle" fill="#6f7177" font-size="10">Wasmtime sandbox</text>
    </g>
  </g>

  <!-- Bottom layer -->
  <g>
    <rect x="40" y="480" width="430" height="65" rx="10" fill="#16181d" stroke="#23262d"/>
    <text x="60" y="505" fill="#a8aab0" font-size="11" font-weight="600" letter-spacing="0.7">LOCAL STORAGE</text>
    <text x="60" y="525" fill="#e6e6e6" font-size="11">RocksDB + age (ChaCha20-Poly1305 at-rest)</text>
    <text x="60" y="540" fill="#6f7177" font-size="10.5">%APPDATA%\Mycelium\db\   ·   keyed by Ed25519 device key in OS keychain</text>

    <rect x="490" y="480" width="430" height="65" rx="10" fill="#16181d" stroke="#23262d"/>
    <text x="510" y="505" fill="#a8aab0" font-size="11" font-weight="600" letter-spacing="0.7">PEER NETWORK   ·   no central server</text>
    <text x="510" y="525" fill="#e6e6e6" font-size="11">Iroh QUIC, NAT traversal, mDNS + DNS discovery</text>
    <text x="510" y="540" fill="#6f7177" font-size="10.5">Optional self-hosted relay (mycelium-relay) buffers ciphertext when peers are offline</text>
  </g>

  <!-- Connector lines -->
  <g stroke="#2a3038" stroke-width="1" fill="none" stroke-dasharray="2 3">
    <line x1="180" y1="150" x2="180" y2="180"/>
    <line x1="440" y1="150" x2="440" y2="180"/>
    <line x1="660" y1="150" x2="660" y2="180"/>
    <line x1="840" y1="150" x2="840" y2="180"/>

    <line x1="127" y1="284" x2="127" y2="390"/>
    <line x1="272" y1="284" x2="272" y2="390"/>
    <line x1="417" y1="284" x2="417" y2="390"/>
    <line x1="562" y1="284" x2="707" y2="390" stroke-opacity="0.4"/>
    <line x1="707" y1="284" x2="707" y2="390"/>
    <line x1="852" y1="284" x2="852" y2="390"/>

    <line x1="127" y1="434" x2="180" y2="480"/>
    <line x1="272" y1="434" x2="180" y2="480"/>
    <line x1="417" y1="434" x2="700" y2="480"/>
  </g>
</svg>
