name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust-fmt-clippy:
    name: Rust format + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsoup-3.0-dev clang
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm --no-progress
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsoup-3.0-dev clang
      - name: cargo test (Windows - excludes wasmedge_port to keep link time sane)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 25
        run: cargo test --workspace --exclude wasmedge_port --no-fail-fast
      - name: cargo test (Linux/macOS - full workspace)
        if: matrix.os != 'windows-latest'
        timeout-minutes: 25
        run: cargo test --workspace --no-fail-fast

  gleam:
    name: Gleam apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [core, cli, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.16'
          rebar3-version: '3.27'
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.app == 'core'
      - uses: Swatinem/rust-cache@v2
        if: matrix.app == 'core'
      - name: Install Linux deps for sidecars
        if: matrix.app == 'core'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libssl-dev libdbus-1-dev libxdo-dev pkg-config
      - name: Build sidecars (apps/core integration tests need them)
        if: matrix.app == 'core'
        run: |
          for s in surreal_port loro_port iroh_port crypto_port wasmedge_port fastembed_port; do
            cargo build -p $s --release
          done
          mkdir -p apps/desktop/bin
          for s in surreal_port loro_port iroh_port crypto_port wasmedge_port fastembed_port; do
            cp target/release/$s apps/desktop/bin/$s
          done
      - name: gleam format check
        working-directory: apps/${{ matrix.app }}
        run: gleam format --check
      - name: gleam build
        working-directory: apps/${{ matrix.app }}
        run: gleam build
      - name: gleam test
        working-directory: apps/${{ matrix.app }}
        run: gleam test

  protocol-schemas:
    name: Protocol schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JSON schemas
        run: |
          npm install --no-save ajv-cli@5 ajv-formats@3
          npx ajv compile --spec=draft2020 -c ajv-formats -s plugins/manifest_schema.json
          for m in plugins/examples/*/manifest.json; do
            [ -f "$m" ] && npx ajv validate --spec=draft2020 -c ajv-formats -s plugins/manifest_schema.json -d "$m"
          done

  requirements-gate:
    name: Requirements traceability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gate
        run: python infra/ci/requirements_gate.py

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # v0.75 — bump prefix to invalidate the macOS cache that was
          # poisoning `cargo` with a rustup-init binary (caused two consecutive
          # "unexpected argument 'build' found" failures on macos-latest).
          prefix-key: "v1-rust-build-desktop"
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsoup-3.0-dev clang
      - name: Verify toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Build
        run: cargo build -p mycelium_desktop --release
