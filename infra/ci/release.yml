name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri-target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            tauri-target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            tauri-target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.16'
          rebar3-version: '3.27'
      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm --no-progress
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsoup-3.0-dev clang
      - name: Build sidecars
        run: |
          cargo build --release --target ${{ matrix.target }} -p surreal_port -p loro_port -p iroh_port -p fastembed_port -p wasmedge_port -p crypto_port -p mycelium_relay
      - name: Stage sidecars for Tauri
        shell: bash
        run: |
          mkdir -p apps/desktop/bin
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          for s in surreal_port loro_port iroh_port fastembed_port wasmedge_port crypto_port; do
            cp target/${{ matrix.target }}/release/$s$ext apps/desktop/bin/$s-${{ matrix.tauri-target }}$ext
          done
      - name: Build BEAM core
        working-directory: apps/core
        run: gleam build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Build desktop bundle
        working-directory: apps/desktop
        run: cargo tauri build --target ${{ matrix.tauri-target }}
      - name: Compute artifact hashes
        shell: bash
        run: |
          find target/${{ matrix.tauri-target }}/release/bundle -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.tar.gz' \) | while read f; do
            sha256sum "$f"
          done > sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mycelium-${{ matrix.target }}
          path: |
            target/${{ matrix.tauri-target }}/release/bundle/**/*
            sha256.txt

  publish-relay:
    name: Publish relay binary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate release notes
        run: |
          echo "Mycelium ${GITHUB_REF#refs/tags/}" > notes.md
          cat */sha256.txt >> notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            mycelium-*/**/*
